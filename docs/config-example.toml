# Blaze user config — copy to ~/.config/blaze/config.toml and edit.
# All fields are optional; missing or unparseable values fall back to defaults.

[appearance]
# Comma-separated CSS-style font stack. Use a programming ligature font here
# if you have one (e.g. "JetBrains Mono", "Fira Code").
font_family = 'ui-monospace, "SF Mono", Menlo, "Cascadia Mono", monospace'
font_size = 13
line_height = 1.2

[terminal]
# Lines of scrollback to retain per pane. 100k is plenty for daily use.
scrollback_lines = 100000

# Path to the shell binary. Leave unset (or empty) to use $SHELL,
# falling back to /bin/zsh.
# shell = "/opt/homebrew/bin/fish"

cursor_blink = true

# Cmd+K AI translate (English → shell command). Pick one provider; cloud
# providers ask for an API key the first time you open the Cmd+K dialog
# and store it in your OS keychain (Keychain on macOS, Secret Service on
# Linux). Three options:
#   ollama — local, no key. Run `ollama serve` and `ollama pull <model>`.
#   claude — Anthropic. Key from console.anthropic.com/settings/keys.
#   openai — OpenAI / OpenAI-compatible. Key from platform.openai.com/api-keys.
[ai]
enabled = false                       # flip to true to enable Cmd+K

# Local Ollama (default — no API key, runs on your machine)
provider = "ollama"
host = "http://localhost:11434"
model = "llama3.2"

# To switch to Anthropic Claude, comment out the three lines above and:
# provider = "claude"
# model = "claude-haiku-4-5"

# To switch to OpenAI:
# provider = "openai"
# model = "gpt-4o-mini"
# host = "https://api.openai.com"     # override only for OpenAI-compatible servers
